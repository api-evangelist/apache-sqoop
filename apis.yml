aid: apache-sqoop
name: Apache Sqoop
description: >-
  Apache Sqoop is a command-line tool designed for efficiently transferring bulk data between
  Apache Hadoop and structured data stores such as relational databases. It supports parallel
  import and export of data, incremental loads, and direct database connectors for MySQL,
  PostgreSQL, Oracle, SQL Server, and DB2. Note: Apache Sqoop has been retired to the Apache
  Attic as of 2021. Users are encouraged to migrate to Apache Spark or Apache NiFi.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Big Data
  - Data Transfer
  - ETL
  - Hadoop
  - RDBMS
  - Retired
created: '2026-03-16'
modified: '2026-04-19'
